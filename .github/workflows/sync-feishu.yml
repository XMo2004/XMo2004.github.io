name: Sync Feishu content

on:
  repository_dispatch:
    types:
      - feishu_publish
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

concurrency:
  group: sync-feishu
  cancel-in-progress: false

jobs:
  sync:
    name: Sync published articles
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Reject non-main manual run
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "::error title=Wrong branch::Run this workflow manually from the main branch."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Feishu content
        run: npm run sync:feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_BITABLE_TABLE_ID: ${{ secrets.FEISHU_BITABLE_TABLE_ID }}

      - name: Verify synchronized site
        run: npm run verify

      - name: Commit generated content
        id: commit
        shell: bash
        run: |
          git add -- src/content/posts/feishu public/media/feishu .feishu-manifest.json

          if git diff --cached --quiet; then
            echo "Feishu content is already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "content: sync Feishu posts"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy synchronized site
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out synchronized repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify site
        run: npm run verify

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
